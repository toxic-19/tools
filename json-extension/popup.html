<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON Toolkit Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">JSON Toolkit <span class="logo-pro">Pro</span></span>
      </div>
      <div class="tab-bar">
        <button class="tab active" data-tab="formatter" id="tab-formatter">格式化</button>
        <button class="tab" data-tab="diff" id="tab-diff">对比</button>
        <button class="tab" data-tab="string" id="tab-string">字符串编辑</button>
      </div>
      <div class="header-actions">
        <a href="https://github.com/toxic-19/tools/tree/main/json-extension" target="_blank" class="btn-github" title="查看 GitHub 源码">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
        </a>
        <button class="btn-theme" id="btn-theme" title="切换白天/夜晚模式">🌙</button>
        <button class="btn-expand" id="btn-expand" title="在新标签页全屏打开">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Formatter Tab -->
    <div class="tab-content active" id="content-formatter">
      <div class="toolbar">
        <button class="btn btn-primary" id="btn-format" title="美化并缩进 JSON 代码">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
          Format
        </button>
        <button class="btn btn-secondary" id="btn-compact" title="压缩 JSON，去除所有空格和换行">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="5 9 2 12 5 15"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
          Compact
        </button>
        <button class="btn btn-warning" id="btn-repair" title="自动修复非标准 JSON（如单引号、尾逗号、注释等）">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
          Repair
        </button>
        <button class="btn btn-secondary" id="btn-escape" title="将 JSON 转换为带转义符的字符串 (JSON.stringify)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11V7a5 5 0 0 1 10 0v4"/><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/></svg>
          Escape
        </button>
        <button class="btn btn-secondary" id="btn-unescape" title="将带转义符的字符串还原为标准 JSON 对象">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          Unescape
        </button>
        <div class="spacer"></div>
        <button class="btn btn-ghost" id="btn-copy" title="复制">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          复制
        </button>
        <button class="btn btn-ghost" id="btn-clear" title="清空">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          清空
        </button>
        <button class="btn btn-sample" id="btn-sample-format" title="填充格式化示例 JSON">示例</button>
      </div>

      <div class="editor-wrap">
        <div class="editor-header">
          <div class="editor-header-left">
            <span class="editor-label">JSON 输入</span>
            <div class="view-toggles" id="view-toggles">
              <button class="view-toggle active" data-mode="raw">源码</button>
              <button class="view-toggle" data-mode="tree">视图 (可折叠)</button>
            </div>
          </div>
          <span class="status-badge" id="status-badge">就绪</span>
        </div>
        <div class="editor-container" id="editor-container">
          <div class="line-numbers" id="line-numbers"></div>
          <textarea
            id="json-input"
            class="json-editor"
            placeholder='在此粘贴或输入 JSON...'
            spellcheck="false"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
          ></textarea>
          <div id="json-tree-view" class="json-tree-view hidden"></div>
        </div>
      </div>

      <div class="info-bar">
        <span id="char-count">0 字符</span>
        <span id="size-info"></span>
        <span id="type-info"></span>
      </div>

      <div class="error-panel hidden" id="error-panel">
        <span class="error-icon">⚠</span>
        <span id="error-msg">JSON 格式错误</span>
      </div>
    </div>

    <!-- String Editor Tab -->
    <div class="tab-content" id="content-string">
      <div class="toolbar string-toolbar">
        <button class="btn btn-primary" id="btn-string-load" title="从左侧 JSON 中加载可编辑字符串字段">
          解析左侧 JSON
        </button>
        <select id="string-path-select" class="string-path-select" title="选择要编辑的字符串路径">
          <option value="">请先加载 JSON</option>
        </select>
        <button class="btn btn-sample" id="btn-sample-string" title="填充字符串编辑示例数据">示例</button>
        <button class="btn btn-secondary" id="btn-string-apply" title="将编辑后的文本写回 JSON 并自动转义换行">
          写回 JSON
        </button>
      </div>
      <div class="string-quick-guide" id="string-quick-guide">
        使用步骤：左侧粘贴 JSON -> 点击“解析左侧 JSON” -> 右侧选择路径并编辑 -> 点击“写回 JSON”。
      </div>
      <div class="string-split-wrap">
        <div class="string-pane string-pane-left">
          <div class="editor-header">
            <span class="editor-label">左侧 JSON（1/3）</span>
          </div>
          <div class="editor-container">
            <textarea
              id="string-json-input"
              class="json-editor"
              placeholder="在这里粘贴完整 JSON..."
              spellcheck="false"
            ></textarea>
          </div>
        </div>
        <div class="string-pane string-pane-right">
          <div class="editor-header">
            <span class="editor-label">右侧字符串编辑（2/3）</span>
            <span class="status-badge" id="string-status">等待解析</span>
          </div>
          <div class="editor-container">
            <textarea
              id="string-editor"
              class="json-editor"
              placeholder="选择一个字符串字段后，可在这里直接编辑。多行会在写回时自动转成 \n。"
              spellcheck="false"
            ></textarea>
          </div>
        </div>
      </div>
      <div class="info-bar">
        <span id="string-meta">未选择字段</span>
      </div>
    </div>

    <!-- Diff Tab -->
    <div class="tab-content" id="content-diff">
      <div class="diff-toolbar">
        <button class="btn btn-primary" id="btn-compare" title="计算左右两个 JSON 之间的差异并高亮">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
          对比
        </button>
        <button class="btn btn-sample" id="btn-sample-diff" title="填充对比示例数据">示例</button>
        <button class="btn btn-ghost" id="btn-swap" title="左右内容对调">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
          交换
        </button>
        <button class="btn btn-ghost" id="btn-clear-diff" title="清空两侧内容">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          清空
        </button>
        <div class="spacer"></div>
        <div class="diff-legend">
          <span class="legend-item added">+ 新增</span>
          <span class="legend-item removed">- 删除</span>
          <span class="legend-item changed">~ 修改</span>
        </div>
      </div>

      <div class="diff-inputs">
        <div class="diff-input-block">
          <div class="editor-header">
            <span class="editor-label">JSON A（原始）</span>
            <span class="diff-badge badge-a" id="badge-a">-</span>
          </div>
          <textarea id="diff-left" class="json-editor diff-editor" placeholder='粘贴原始 JSON...' spellcheck="false"></textarea>
        </div>
        <div class="diff-divider"></div>
        <div class="diff-input-block">
          <div class="editor-header">
            <span class="editor-label">JSON B（修改后）</span>
            <span class="diff-badge badge-b" id="badge-b">-</span>
          </div>
          <textarea id="diff-right" class="json-editor diff-editor" placeholder='粘贴修改后 JSON...' spellcheck="false"></textarea>
        </div>
      </div>

      <div class="diff-result hidden" id="diff-result">
        <div class="diff-result-header">
          <span>对比结果</span>
          <span class="diff-stats" id="diff-stats"></span>
        </div>
        <div class="diff-panels" id="diff-panels">
          <div class="diff-panel" id="diff-left-result"></div>
          <div class="diff-panel" id="diff-right-result"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="lib/jsonrepair.js"></script>
  <script src="popup.js"></script>
</body>
</html>
